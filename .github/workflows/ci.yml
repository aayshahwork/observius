name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check api/ workers/ sdk/ shared/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mypy types-requests -r api/requirements.txt -r workers/requirements.txt
      - run: mypy api/ workers/ --ignore-missing-imports

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-asyncio -r api/requirements.txt -r workers/requirements.txt && pip install --no-deps -e sdk/
      - run: pytest tests/ -x -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd dashboard && npm ci
      - run: cd dashboard && npm run lint

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: pip-audit API deps
        run: pip install pip-audit && pip-audit -r api/requirements.txt
      - name: pip-audit Worker deps
        run: pip-audit -r workers/requirements.txt
      - name: npm audit dashboard
        run: cd dashboard && npm ci && npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: docker build -f infra/Dockerfile.api -t computeruse-api:test .
      - name: Build Worker image
        run: docker build -f infra/Dockerfile.worker -t computeruse-worker:test .
      - name: Build Dashboard image
        run: docker build -f infra/Dockerfile.dashboard -t computeruse-dashboard:test ./dashboard
