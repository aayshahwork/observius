name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install formatters
        run: pip install black ruff
      - name: black --check
        run: black --check sdk/computeruse/
      - name: ruff check
        run: ruff check sdk/computeruse/

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install API + worker dependencies
        run: pip install -r api/requirements.txt -r workers/requirements.txt
      - name: Install SDK
        run: cd sdk && pip install -e .
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-timeout
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
      - name: Run unit tests
        run: pytest tests/unit -x -v --timeout=30
