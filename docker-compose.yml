# Pokant — zero-setup local development stack
# Usage: `docker compose up --build`
#
# Everything needed to run Pokant locally is embedded in this file.
# The only external input is ANTHROPIC_API_KEY, which you can either:
#   1. Export in your shell:   export ANTHROPIC_API_KEY=sk-ant-...
#   2. Create a .env file:     echo 'ANTHROPIC_API_KEY=sk-ant-...' > .env
#   3. Leave it blank — the stack will still come up and the dashboard
#      register/login flow will work, but actual task execution will fail
#      with a clear error until a key is provided.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: computeruse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/db/migrations:/migrations:ro
      - ./api/db/init-migrations.sh:/init-migrations.sh:ro
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: computeruse
    entrypoint: ["bash", "/init-migrations.sh"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/computeruse
      REDIS_URL: redis://redis:6379/0
      # ANTHROPIC_API_KEY, BROWSERBASE_API_KEY, BROWSERBASE_PROJECT_ID are
      # picked up from .env (via env_file above). Do NOT re-declare them here
      # — doing so would override .env with the shell's value (empty or stale).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./api:/app/api
      - ./shared:/app/shared
      - replays:/app/replays
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    env_file:
      - path: .env
        required: false
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/computeruse
      REDIS_URL: redis://redis:6379/0
      # ANTHROPIC_API_KEY (required for task execution) + optional
      # BROWSERBASE_API_KEY / BROWSERBASE_PROJECT_ID are picked up from .env
      # via env_file above. Do NOT re-declare them here — doing so would
      # override .env with the shell's value (empty or stale).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./workers:/app/workers
      - ./shared:/app/shared
      - replays:/app/replays
    command: celery -A workers.main worker --loglevel=info --pool=prefork --concurrency=1

  dashboard:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      # Browser-facing API URL — must be reachable from the user's browser,
      # so localhost:8000 (NOT http://api:8000, which is Docker-internal).
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Server-side (SSR) API URL — runs inside the Docker network.
      INTERNAL_API_URL: http://api:8000
      # Auth is ENFORCED in local dev. First-time users will see the login
      # page, register via /signup, and receive their own API key.
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
      - dashboard_next:/app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
  dashboard_node_modules:
  dashboard_next:
  replays:
