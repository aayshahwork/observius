# Railway deployment configuration for the API service.
#
# This is the primary service. Other services (worker, dashboard, cron)
# are configured via separate TOML files — copy the relevant file to
# railway.toml in the Railway dashboard per-service settings, or reference
# the Dockerfile path directly in Railway's UI.
#
# See infra/DEPLOY.md for full setup instructions.

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile.api"
watchPatterns = ["api/**", "shared/**", "infra/Dockerfile.api"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
numReplicas = 1
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
