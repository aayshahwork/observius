# Railway deployment configuration for the Celery worker service.
#
# In the Railway dashboard, create a new service and either:
#   1. Copy this file's contents into the service's railway.toml, OR
#   2. Set the Dockerfile path to infra/Dockerfile.worker manually.

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile.worker"
watchPatterns = ["workers/**", "shared/**", "api/models/**", "api/config.py", "api/db/**", "infra/Dockerfile.worker"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 15
numReplicas = 1
startCommand = "celery -A workers.main worker --loglevel=info --pool=prefork --concurrency=2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
