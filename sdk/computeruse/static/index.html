<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokant Dashboard</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;
--green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;--cyan:#39d2c0;--purple:#bc8cff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--blue);text-decoration:none}
.header{display:flex;align-items:center;gap:16px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.header h1{font-size:16px;font-weight:600;color:var(--text)}
.tabs{display:flex;gap:4px}
.tab{padding:6px 16px;border-radius:6px;cursor:pointer;color:var(--dim);font-size:13px;border:1px solid transparent}
.tab:hover{color:var(--text)}.tab.active{color:var(--text);background:var(--bg);border-color:var(--border)}
.container{max-width:1200px;margin:0 auto;padding:24px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tr.row:hover{background:var(--surface);cursor:pointer}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.dot.completed{background:var(--green)}.dot.failed{background:var(--red)}.dot.timeout{background:var(--yellow)}
.mono{font-family:monospace;font-size:12px;color:var(--dim)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.card h3{font-size:13px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.card .val{font-size:24px;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.back{cursor:pointer;color:var(--blue);font-size:13px;margin-bottom:16px;display:inline-block}
.back:hover{text-decoration:underline}
.detail-header{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.detail-header .card{margin-bottom:0}
.timeline{display:flex;gap:2px;margin-bottom:24px;height:32px;border-radius:4px;overflow:hidden}
.timeline .seg{flex:1;min-width:4px;position:relative;cursor:pointer}
.timeline .seg.ok{background:var(--green)}.timeline .seg.err{background:var(--red)}.timeline .seg.active{outline:2px solid var(--blue);outline-offset:1px;z-index:1}
.screenshot-viewer{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;margin-bottom:16px}
.screenshot-viewer img{max-width:100%;max-height:500px;border-radius:4px}
.screenshot-nav{display:flex;justify-content:center;gap:12px;margin-top:12px}
.screenshot-nav button{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.screenshot-nav button:hover{border-color:var(--blue)}
.screenshot-nav button:disabled{opacity:.3;cursor:default}
.step-meta{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.step-meta dt{color:var(--dim);font-size:12px;margin-top:8px}.step-meta dd{margin-left:0}
.bar-chart .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-chart .bar-label{width:120px;font-size:12px;color:var(--dim);text-align:right;flex-shrink:0}
.bar-chart .bar-track{flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-chart .bar-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-chart .bar-count{width:40px;font-size:12px;color:var(--dim)}
.empty{text-align:center;padding:48px;color:var(--dim)}
.retry-timeline{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px}
.retry-timeline h3{margin:0 0 12px 0;font-size:14px;color:var(--text)}
.attempts-row{display:flex;align-items:stretch;gap:8px;overflow-x:auto;padding-bottom:4px}
.attempt-card{flex:0 0 220px;border:1px solid var(--border);border-radius:6px;padding:12px;font-size:12px;background:var(--bg)}
.attempt-card.success{border-color:var(--green);background:rgba(63,185,80,0.06)}
.attempt-card.failed{border-color:var(--red);background:rgba(248,81,73,0.06)}
.attempt-header{display:flex;justify-content:space-between;margin-bottom:8px;font-weight:bold}
.attempt-status{font-size:16px}
.diagnosis-category{display:inline-block;background:var(--surface);padding:2px 8px;border-radius:4px;font-size:11px;margin-bottom:4px;border:1px solid var(--border)}
.diagnosis-cause{margin:4px 0;color:var(--dim)}
.diagnosis-method{font-size:10px;color:var(--dim);margin-top:2px}
.retry-hint{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.diagnosis-cost{margin-top:6px;font-size:10px;color:var(--dim)}
.env-changes{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.env-tag{display:inline-block;background:var(--surface);padding:1px 6px;border-radius:3px;font-size:10px;border:1px solid var(--border)}
.system-msg-hint{font-size:10px;color:var(--dim);margin-top:4px}
.attempt-arrow{display:flex;align-items:center;font-size:20px;color:var(--dim)}
.retry-summary{margin-top:12px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--dim)}
.no-diagnosis{color:var(--green);margin-top:8px}
.retry-stats .mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:8px 0 12px}
.retry-stats .mini-val{font-size:20px;font-weight:600}
.retry-stats .mini-label{font-size:12px;color:var(--dim)}
</style>
</head>
<body>
<div class="header">
  <h1>Pokant</h1>
  <div class="tabs">
    <div class="tab" data-tab="runs" onclick="navigate('#/')">Runs</div>
    <div class="tab" data-tab="workflows" onclick="navigate('#/workflows')">Workflows</div>
    <div class="tab" data-tab="stats" onclick="navigate('#/stats')">Stats</div>
  </div>
</div>
<div class="container" id="app"></div>
<script>
const $ = id => document.getElementById(id);
let runs = [], workflows = [], currentStep = 0;

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) return null;
  return r.json();
}

function navigate(hash) { location.hash = hash; }
function fmtDuration(ms) { return ms < 1000 ? ms + 'ms' : (ms / 1000).toFixed(1) + 's'; }
function fmtCost(cents) { return '$' + (cents / 100).toFixed(2); }
function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
function truncId(id) { return id.length > 12 ? id.slice(0, 8) + '...' : id; }

function renderRuns() {
  setActiveTab('runs');
  if (!runs.length) { $('app').innerHTML = '<div class="empty">No runs found</div>'; return; }
  const sorted = [...runs].sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
  $('app').innerHTML = `<table>
    <thead><tr><th>Status</th><th>Task ID</th><th>Steps</th><th>Duration</th><th>Cost</th><th>Error</th><th>Time</th></tr></thead>
    <tbody>${sorted.map(r => `<tr class="row" onclick="navigate('#/run/${r.task_id}')">
      <td><span class="dot ${r.status}"></span>${r.status}</td>
      <td class="mono">${truncId(r.task_id)}</td>
      <td>${r.step_count || 0}</td>
      <td>${fmtDuration(r.duration_ms || 0)}</td>
      <td>${fmtCost(r.cost_cents || 0)}</td>
      <td class="mono">${r.error_category || '-'}</td>
      <td class="mono">${fmtTime(r.created_at)}</td>
    </tr>`).join('')}</tbody></table>`;
}

function renderRetryTimeline(run) {
  if (!run.attempts || (run.total_attempts || 1) <= 1) return '';
  const attempts = run.attempts;
  const diagCost = attempts.reduce((s, a) => s + ((a.diagnosis && a.diagnosis.analysis_cost_cents) || 0), 0);
  const saved = Math.max(0, (run.total_attempts || 1) - 2);
  return `<div class="retry-timeline"><h3>Retry Intelligence (${run.total_attempts} attempts)</h3>
    <div class="attempts-row">${attempts.map((a, i) => {
      const ok = a.status === 'completed';
      const d = a.diagnosis;
      const p = a.recovery_plan;
      return `<div class="attempt-card ${ok ? 'success' : 'failed'}">
        <div class="attempt-header"><span>Attempt ${a.attempt}</span><span class="attempt-status">${ok ? '\u2713' : '\u2717'}</span></div>
        ${d ? `<div class="diagnosis-category">${d.category}${d.subcategory ? ' / ' + d.subcategory : ''}</div>
          <div class="diagnosis-cause">${d.root_cause || ''}</div>
          <div class="diagnosis-method">${d.analysis_method === 'llm_haiku' ? '\ud83e\udd16 AI diagnosed' : '\ud83d\udccf Rule matched'}</div>
          <div class="retry-hint"><strong>Strategy:</strong> ${d.retry_hint || ''}</div>
          ${p && (p.fresh_browser || p.stealth_mode || p.clear_cookies || p.increase_timeout || p.reduce_max_actions) ? `<div class="env-changes">
            ${p.fresh_browser ? '<span class="env-tag">\ud83d\udd04 fresh browser</span>' : ''}
            ${p.stealth_mode ? '<span class="env-tag">\ud83d\udd75\ufe0f stealth</span>' : ''}
            ${p.clear_cookies ? '<span class="env-tag">\ud83c\udf6a clear cookies</span>' : ''}
            ${p.increase_timeout ? '<span class="env-tag">\u23f1\ufe0f longer timeout</span>' : ''}
            ${p.reduce_max_actions ? '<span class="env-tag">\ud83c\udfaf deliberate mode</span>' : ''}
          </div>` : ''}
          ${p && p.extend_system_message ? '<div class="system-msg-hint">\ud83d\udccb System prompt modified</div>' : ''}
          <div class="diagnosis-cost">\ud83d\udcb0 $${((d.analysis_cost_cents || 0) / 100).toFixed(4)}</div>`
        : ok ? '<div class="no-diagnosis">Succeeded</div>' : ''}
      </div>${i < attempts.length - 1 ? '<div class="attempt-arrow">\u2192</div>' : ''}`;
    }).join('')}</div>
    <div class="retry-summary">Diagnosis cost: $${(diagCost / 100).toFixed(4)}${saved > 0 ? ' | Est. savings: ~$' + (saved * 0.19).toFixed(2) + ' (' + saved + ' prevented blind retries)' : ''}</div></div>`;
}

function renderRetryStatsSection(stats) {
  const rs = stats.adaptive_retry_stats;
  if (!rs || rs.runs_retried === 0) return '';
  const cats = rs.category_counts || {};
  const maxC = Math.max(1, ...Object.values(cats));
  const catColors = {'element_interaction':'var(--yellow)','navigation':'var(--purple)','anti_bot':'var(--red)','authentication':'var(--red)','content_mismatch':'var(--cyan)','agent_loop':'var(--yellow)','agent_reasoning':'var(--blue)','infrastructure':'var(--red)','unknown':'var(--dim)'};
  return `<div class="card retry-stats"><h3>Retry Intelligence</h3>
    <div class="mini-grid">
      <div><div class="mini-val">${rs.runs_retried}</div><div class="mini-label">Runs retried</div></div>
      <div><div class="mini-val">${rs.avg_attempts}</div><div class="mini-label">Avg attempts</div></div>
      <div><div class="mini-val">$${(rs.total_diagnosis_cost_cents / 100).toFixed(4)}</div><div class="mini-label">Diagnosis cost</div></div>
    </div>
    ${Object.keys(cats).length ? `<div class="bar-chart">
      ${Object.entries(cats).map(([k,v]) => `<div class="bar-row">
        <div class="bar-label">${k.replace(/_/g,' ')}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(v/maxC*100).toFixed(0)}%;background:${catColors[k]||'var(--blue)'}"></div></div>
        <div class="bar-count">${v}</div></div>`).join('')}
    </div>` : ''}</div>`;
}

function renderDetail(id) {
  setActiveTab('');
  const run = runs.find(r => r.task_id === id);
  if (!run) { $('app').innerHTML = '<div class="empty">Run not found</div>'; return; }
  const steps = run.steps || [];
  currentStep = 0;

  function stepHTML(i) {
    const s = steps[i];
    if (!s) return '<div class="step-meta"><p>No step data</p></div>';
    return `<dl class="step-meta">
      <dt>Step</dt><dd>${i + 1} of ${steps.length}</dd>
      <dt>Action</dt><dd>${s.action_type || '-'}</dd>
      <dt>Description</dt><dd>${s.description || '-'}</dd>
      <dt>Duration</dt><dd>${s.duration_ms ? fmtDuration(s.duration_ms) : '-'}</dd>
      <dt>Success</dt><dd>${s.success !== false ? 'Yes' : 'No'}</dd>
      <dt>Tokens</dt><dd>${(s.tokens_in || 0)} in / ${(s.tokens_out || 0)} out</dd>
    </dl>`;
  }

  function screenshotHTML(i) {
    const s = steps[i];
    if (!s || !s.screenshot_path) return '<div class="screenshot-viewer"><p style="color:var(--dim)">No screenshot</p></div>';
    return `<div class="screenshot-viewer">
      <img src="/screenshots/${encodeURIComponent(s.screenshot_path)}" onerror="this.parentElement.innerHTML='<p style=color:var(--dim)>Screenshot not available</p>'" />
    </div>`;
  }

  function update() {
    const sv = document.getElementById('ss-viewer');
    const sm = document.getElementById('step-meta');
    if (sv) sv.innerHTML = screenshotHTML(currentStep);
    if (sm) sm.innerHTML = stepHTML(currentStep);
    document.querySelectorAll('.timeline .seg').forEach((s, i) => s.classList.toggle('active', i === currentStep));
    const prev = document.getElementById('btn-prev');
    const next = document.getElementById('btn-next');
    if (prev) prev.disabled = currentStep <= 0;
    if (next) next.disabled = currentStep >= steps.length - 1;
  }

  $('app').innerHTML = `
    <div class="back" onclick="navigate('#/')">&larr; Back to runs</div>
    <div class="detail-header">
      <div class="card"><h3>Task</h3><div class="mono">${run.task_id}</div>
        <div style="margin-top:8px"><span class="dot ${run.status}"></span>${run.status}</div></div>
      <div class="card"><h3>Metrics</h3>
        <div>Steps: ${run.step_count || 0} &middot; Duration: ${fmtDuration(run.duration_ms || 0)} &middot; Cost: ${fmtCost(run.cost_cents || 0)}</div>
        <div class="mono" style="margin-top:4px">${fmtTime(run.created_at)}${run.error ? ' &middot; Error: ' + run.error : ''}</div></div>
    </div>
    ${renderRetryTimeline(run)}
    ${steps.length ? `<div class="timeline">${steps.map((s, i) =>
      `<div class="seg ${s.success !== false ? 'ok' : 'err'}${i === 0 ? ' active' : ''}" onclick="window._goStep(${i})" title="Step ${i+1}: ${s.action_type || ''}"></div>`
    ).join('')}</div>` : ''}
    <div id="ss-viewer">${screenshotHTML(0)}</div>
    <div class="screenshot-nav"><button id="btn-prev" onclick="window._goStep(currentStep-1)" disabled>&larr; Prev</button>
      <button id="btn-next" onclick="window._goStep(currentStep+1)" ${steps.length <= 1 ? 'disabled' : ''}>Next &rarr;</button></div>
    <div id="step-meta">${stepHTML(0)}</div>`;

  window._goStep = function(i) { currentStep = Math.max(0, Math.min(i, steps.length - 1)); update(); };
}

function setActiveTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
}

function renderWorkflows() {
  setActiveTab('workflows');
  if (!workflows.length) { $('app').innerHTML = '<div class="empty">No compiled workflows yet.<br><br><span style="color:var(--dim)">Compile a run: <code>computeruse compile &lt;task_id&gt;</code></span></div>'; return; }
  $('app').innerHTML = `<table>
    <thead><tr><th>Name</th><th>Steps</th><th>Parameters</th><th>Compiled</th></tr></thead>
    <tbody>${workflows.map(w => `<tr class="row" onclick="navigate('#/workflow/${encodeURIComponent(w.name)}')">
      <td><span class="dot completed"></span>${w.name}</td>
      <td>${(w.steps || []).length}</td>
      <td class="mono">${Object.keys(w.parameters || {}).join(', ') || '-'}</td>
      <td class="mono">${fmtTime(w.compiled_at)}</td>
    </tr>`).join('')}</tbody></table>`;
}

function renderWorkflowDetail(name) {
  setActiveTab('workflows');
  const wf = workflows.find(w => w.name === name);
  if (!wf) { $('app').innerHTML = '<div class="empty">Workflow not found</div>'; return; }
  const steps = wf.steps || [];
  const paramKeys = Object.keys(wf.parameters || {});

  $('app').innerHTML = `
    <div class="back" onclick="navigate('#/workflows')">&larr; Back to workflows</div>
    <div class="detail-header">
      <div class="card"><h3>Workflow</h3><div style="font-size:18px;font-weight:600">${wf.name}</div>
        ${wf.task_description ? `<div class="mono" style="margin-top:4px">${wf.task_description}</div>` : ''}
        <div class="mono" style="margin-top:4px">${fmtTime(wf.compiled_at)}</div></div>
      <div class="card"><h3>Summary</h3>
        <div>${steps.length} steps &middot; ${paramKeys.length} parameter${paramKeys.length !== 1 ? 's' : ''}</div>
        ${paramKeys.length ? `<div class="mono" style="margin-top:4px">Params: ${paramKeys.join(', ')}</div>` : ''}
        <div style="margin-top:8px;color:var(--green)">Replay cost: ~$0.00 (deterministic)</div></div>
    </div>
    <div class="card"><h3>Steps</h3>
      <table style="margin-top:8px">
        <thead><tr><th>#</th><th>Action</th><th>Intent</th><th>Selector</th></tr></thead>
        <tbody>${steps.map((s, i) => `<tr>
          <td>${i + 1}</td>
          <td><span style="color:var(--blue)">${s.action_type || '-'}</span></td>
          <td>${s.intent || '-'}</td>
          <td class="mono">${s.selectors && s.selectors.length ? s.selectors[0].value || '-' : '-'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

function renderStats() {
  setActiveTab('stats');
  fetchJSON('/api/stats').then(stats => {
    if (!stats) { $('app').innerHTML = '<div class="empty">No data</div>'; return; }
    const cats = stats.error_categories || {};
    const maxCat = Math.max(1, ...Object.values(cats));
    const colors = {'rate_limit':' var(--yellow)','browser':'var(--red)','network':'var(--purple)','timeout':'var(--yellow)','auth':'var(--red)','llm':'var(--cyan)'};
    $('app').innerHTML = `
      <div class="grid">
        <div class="card"><h3>Total Runs</h3><div class="val">${stats.total_runs}</div></div>
        <div class="card"><h3>Success Rate</h3><div class="val" style="color:var(--green)">${stats.success_rate}%</div></div>
        <div class="card"><h3>Total Cost</h3><div class="val">${fmtCost(stats.total_cost_cents)}</div></div>
        <div class="card"><h3>Avg Duration</h3><div class="val">${fmtDuration(stats.avg_duration_ms)}</div></div>
      </div>
      <div class="card"><h3>Status Breakdown</h3>
        <div style="margin-top:8px">Completed: ${stats.completed} &middot; Failed: ${stats.failed} &middot; Timeout: ${stats.timeout}</div></div>
      ${Object.keys(cats).length ? `<div class="card"><h3>Error Categories</h3><div class="bar-chart" style="margin-top:12px">
        ${Object.entries(cats).map(([k,v]) => `<div class="bar-row">
          <div class="bar-label">${k}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(v/maxCat*100).toFixed(0)}%;background:${colors[k]||'var(--blue)'}"></div></div>
          <div class="bar-count">${v}</div></div>`).join('')}
      </div></div>` : ''}
      ${renderRetryStatsSection(stats)}`;
  });
}

async function init() {
  [runs, workflows] = await Promise.all([
    fetchJSON('/api/runs').then(r => r || []),
    fetchJSON('/api/workflows').then(r => r || []),
  ]);
  route();
}

function route() {
  const h = location.hash || '#/';
  if (h.startsWith('#/run/')) renderDetail(decodeURIComponent(h.slice(6)));
  else if (h.startsWith('#/workflow/')) renderWorkflowDetail(decodeURIComponent(h.slice(11)));
  else if (h === '#/workflows') renderWorkflows();
  else if (h === '#/stats') renderStats();
  else renderRuns();
}

window.addEventListener('hashchange', route);
init();
</script>
</body>
</html>
